<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5"
    />
    <!-- Performance: DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://docs.google.com" />

    <!-- Primary SEO -->
    <title>
      REDDOT Innovative Solutions | Engineering Intelligence for the Future
    </title>
    <meta
      name="description"
      content="REDDOT Innovative Solutions — Building AI Agents, Enterprise Software, Machine Learning, RAG Systems, IoT, Cloud Engineering, and Digital Transformation for businesses worldwide."
    />
    <meta
      name="keywords"
      content="AI agents, machine learning, enterprise software, generative AI, LLM development, RAG systems, AI automation, cloud engineering, IoT, cybersecurity, data analytics, digital transformation"
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563EB" />
    <link rel="canonical" href="https://reddot.ai/" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://reddot.ai/" />
    <meta property="og:site_name" content="REDDOT Innovative Solutions" />
    <meta
      property="og:title"
      content="REDDOT Innovative Solutions | Engineering Intelligence for the Future"
    />
    <meta
      property="og:description"
      content="Building AI Systems, Enterprise Software, Automation Platforms, Machine Learning Solutions, and Smart Embedded Technologies for businesses worldwide."
    />
    <meta property="og:image" content="https://reddot.ai/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="REDDOT Innovative Solutions - Engineering AI for the Future"
    />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@reddotai" />
    <meta name="twitter:creator" content="@reddotai" />
    <meta
      name="twitter:title"
      content="REDDOT Innovative Solutions | Engineering Intelligence for the Future"
    />
    <meta
      name="twitter:description"
      content="Building AI Systems, Enterprise Software, Automation Platforms, and Machine Learning Solutions for businesses worldwide."
    />
    <meta name="twitter:image" content="https://reddot.ai/og-image.jpg" />
    <meta name="twitter:image:alt" content="REDDOT Innovative Solutions" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/reddot%20logo.png" />

    <!-- JSON-LD: Organization Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "REDDOT Innovative Solutions",
        "url": "https://reddot.ai",
        "logo": "https://reddot.ai/logo.svg",
        "description": "Engineering Intelligence for the Future. Building AI Systems, Enterprise Software, and Smart Technologies.",
        "email": "hello@reddot.ai",
        "telephone": "+1-234-567-890",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "San Francisco",
          "addressRegion": "CA",
          "addressCountry": "US"
        },
        "sameAs": [
          "https://linkedin.com/company/reddot-ai",
          "https://twitter.com/reddotai",
          "https://github.com/reddot-ai"
        ],
        "foundingDate": "2021",
        "numberOfEmployees": {
          "@type": "QuantitativeValue",
          "minValue": 50,
          "maxValue": 100
        },
        "knowsAbout": [
          "Artificial Intelligence",
          "Machine Learning",
          "Enterprise Software",
          "Cloud Engineering",
          "IoT Solutions",
          "Cybersecurity"
        ]
      }
    </script>

    <!-- JSON-LD: WebSite Schema (enables Sitelinks Searchbox) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "url": "https://reddot.ai",
        "name": "REDDOT Innovative Solutions",
        "description": "Engineering AI and Enterprise Solutions",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://reddot.ai/blog?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- JSON-LD: FAQ Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What AI services does REDDOT offer?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "REDDOT offers 16 comprehensive AI services including AI Agents, Generative AI, Machine Learning, Deep Learning, LLM Development, RAG Systems, AI Automation, SaaS, Web Development, Mobile Apps, IoT Solutions, Embedded Systems, Cloud Engineering, Cybersecurity, Data Analytics, and Digital Transformation."
            }
          },
          {
            "@type": "Question",
            "name": "Which industries does REDDOT serve?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "REDDOT serves Healthcare, Education, Finance, Manufacturing, Retail, Agriculture, Government, Telecommunications, Smart Cities, Energy, and Automotive industries."
            }
          },
          {
            "@type": "Question",
            "name": "How can I book a consultation with REDDOT?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "You can book a free consultation by visiting our Contact page at reddot.ai/contact or clicking 'Book Consultation' in the navigation bar."
            }
          }
        ]
      }
    </script>

    <!-- Fonts: preconnect + swap for CLS prevention -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript
      ><link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    /></noscript>

    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
