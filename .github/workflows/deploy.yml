name: Deploy to Production
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment script on remote server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # If app directory exists but isn't a git repo, recreate it
            if [ -d "$HOME/app" ] && [ ! -d "$HOME/app/.git" ]; then
              echo "Re-initializing as a git repository..."
              sudo rm -rf $HOME/app
            fi
            
            # Clone if it doesn't exist
            if [ ! -d "$HOME/app" ]; then
              git clone https://github.com/jaikeerthi07/REDDOT.AI.git $HOME/app
            fi
            
            # Ensure permissions are correct
            sudo chown -R $USER:$USER $HOME/app
            
            cd $HOME/app
            git fetch --all
            git reset --hard origin/main
            
            # Run deployment
            chmod +x ./remote_deploy.sh
            ./remote_deploy.sh
